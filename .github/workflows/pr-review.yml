name: Claude PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Code Review with Claude
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests
          
      - name: Download Claude Review Script
        run: |
          # Fetching the script directly from this repository (assuming it's checked in)
          # If this action is distributed, the script should be bundled.
          if [ ! -f "claude-review.py" ]; then
            curl -sO https://raw.githubusercontent.com/claude-builders-bounty/claude-builders-bounty/main/claude-review.py || echo "Warning: Make sure claude-review.py exists in the root."
          fi
          chmod +x claude-review.py
          
      - name: Generate Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python claude-review.py --pr "$PR_URL" --output review.md
          
      - name: Post Review as PR Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body-file review.md
